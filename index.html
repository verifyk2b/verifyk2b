<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Krumbs 2 Bricks</title>
  <meta name="description" content="Krumbs 2 Bricks (K2B) — verification-first. Verify. Don’t trust." />

  <style>
    /* =========================
       RESET / BASE
       ========================= */
    *{ box-sizing:border-box; }
    html, body{ height:100%; }
    body{
      margin:0;
      background:#000;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color:#fff;
      display:flex;
      justify-content:center;
    }
    a{ color:inherit; text-decoration:none; -webkit-tap-highlight-color:transparent; }
    img{ display:block; max-width:100%; }

    /* =========================
       PAGE WRAP (centers on desktop)
       ========================= */
    .page{
      width:100%;
      padding: 18px 14px;
      display:flex;
      justify-content:center;
    }

    /* =========================
       FRAME (responsive card)
       ========================= */
    .frame{
      width:100%;
      max-width: 520px;       /* mobile default */
      min-height: 100svh;     /* better than 100vh on mobile */
      position:relative;
      background:#000;
      overflow:hidden;
      border-radius: 0;
    }

    /* Desktop/tablet: turn into a centered "card" */
    @media (min-width: 768px){
      .page{ padding: 40px 22px; }

      .frame{
        max-width: 980px;
        min-height: 680px;
        border-radius: 26px;
        border: 1px solid rgba(255,255,255,.12);
        box-shadow: 0 40px 90px rgba(0,0,0,.75);
      }
    }

    @media (min-width: 1100px){
      .frame{ max-width: 1100px; }
    }

    /* =========================
       HERO IMAGE
       ========================= */
    .hero{
      width:100%;
      height:100%;
      min-height: 100svh;
      object-fit: cover;
      display:block;
      background:#000;
    }

    /* In desktop card mode, keep a nice hero proportion */
    @media (min-width: 768px){
      .hero{
        min-height: 680px;
      }
    }

    /* =========================
       READABILITY OVERLAY
       ========================= */
    .shade{
      position:absolute;
      inset:auto 0 0 0;
      height: 46%;
      background: linear-gradient(
        to top,
        rgba(0,0,0,.92),
        rgba(0,0,0,.58),
        rgba(0,0,0,0)
      );
      pointer-events:none;
    }

    /* Desktop: slightly shorter gradient so image shows more */
    @media (min-width: 768px){
      .shade{ height: 40%; }
    }

    /* =========================
       BUTTON WRAP
       ========================= */
    .button-wrap{
      position:absolute;
      inset:auto 0 0 0;
      padding: 0 16px 18px;
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    /* Desktop: wider padding + slightly higher placement */
    @media (min-width: 768px){
      .button-wrap{
        padding: 0 34px 30px;
      }
    }

    .buttons{
      display:flex;
      gap:12px;
    }

    /* Desktop: make buttons not comically wide */
    @media (min-width: 768px){
      .buttons{
        max-width: 520px;
        gap:14px;
      }
    }

    /* =========================
       BASE BUTTON
       ========================= */
    .btn{
      flex:1;
      display:flex;
      align-items:center;
      justify-content:center;

      min-height:54px;
      padding:14px 12px;

      border-radius:18px;
      font-weight:900;
      font-size:1.02rem;
      letter-spacing:.04em;
      text-transform:uppercase;

      border:1px solid rgba(255,255,255,.14);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.18),
        0 18px 28px rgba(0,0,0,.55);

      transition:
        transform .15s ease,
        box-shadow .15s ease,
        filter .15s ease;

      user-select:none;
      cursor:pointer;
    }

    /* Desktop: slightly larger buttons */
    @media (min-width: 768px){
      .btn{
        min-height:58px;
        font-size:1.06rem;
        border-radius:20px;
      }
    }

    /* VERIFY (PRIMARY) */
    .btn.verify{
      background: linear-gradient(165deg,#8b5cf6,#4a1dbd);
      color:#fff;
    }

    /* BUY (SECONDARY) */
    .btn.buy{
      background: linear-gradient(165deg,#bef264,#4d7c0f);
      color:#111;
    }

    /* Interactions */
    .btn:hover{
      transform: translateY(-1px);
      filter: brightness(1.05);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.22),
        0 24px 34px rgba(0,0,0,.6);
    }
    .btn:active{
      transform: translateY(1px);
      filter: brightness(.98);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.12),
        0 12px 18px rgba(0,0,0,.55);
    }
    .btn:focus-visible{
      outline:2px solid rgba(255,255,255,.65);
      outline-offset:3px;
    }

    /* =========================
       SMALL SCREENS
       ========================= */
    @media (max-width:360px){
      .btn{ font-size:.98rem; min-height:52px; }
      .button-wrap{ padding:0 14px 16px; }
    }
  </style>
</head>

<body>
  <div class="page">
    <main class="frame">
      <img class="hero" src="hero.png" alt="Krumbs 2 Bricks" />
      <div class="shade" aria-hidden="true"></div>

      <div class="button-wrap">
        <div class="buttons">
          <a class="btn verify"
             href="https://verifyk2b.github.io/verifyk2b/verify/"
             target="_blank" rel="noopener noreferrer">
            VERIFY
          </a>

          <a class="btn buy"
             href="https://pump.fun/At4L287tND4vLSURFeVz2fqhbvNgnE76nfFg7gy9pump"
             target="_blank" rel="noopener noreferrer">
            BUY
          </a>
        </div>
      </div>
    </main>
  </div>
</body>
</html>
