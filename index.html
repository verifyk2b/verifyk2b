<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>K2B Verification Dashboard</title>

<style>
body{
  margin:0;
  background:#000;
  color:#fff;
  font-family:system-ui;
}
.wrap{max-width:1200px;margin:auto;padding:20px}

.hero{text-align:center;margin-bottom:20px}
.logo{width:420px;max-width:100%}
.tagline{color:#aaa}

.grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:12px;
  margin-top:20px;
}

.card{
  background:#0f1115;
  border:1px solid #222;
  padding:14px;
  border-radius:14px;
}

.label{font-size:11px;color:#888;text-transform:uppercase}
.value{font-size:20px;font-weight:800;margin-top:6px}

.main{
  display:grid;
  grid-template-columns:1.6fr 1fr;
  gap:14px;
  margin-top:18px;
}

.btn{
  display:block;
  padding:12px;
  margin:8px 0;
  text-align:center;
  background:#111;
  border:1px solid #333;
  border-radius:12px;
  color:#fff;
  font-weight:700;
}

.btn.green{background:linear-gradient(135deg,#b6ff6b,#2d7a0a);color:#000}

.risk{
  font-size:22px;
  font-weight:900;
}

.low{color:#7CFC90}
.med{color:#FFD166}
.high{color:#FF5C5C}

.small{font-size:12px;color:#888;margin-top:6px}

iframe{
  width:100%;
  height:600px;
  border:0;
  border-radius:14px;
}
</style>
</head>

<body>

<div class="wrap">

  <div class="hero">
    <img class="logo" src="hero.png"/>
    <div class="tagline">
      Fixed Supply • Locked Liquidity • On-Chain Verification Engine
    </div>
  </div>

  <!-- LIVE METRICS -->
  <div class="grid">

    <div class="card">
      <div class="label">Liquidity (USD)</div>
      <div class="value" id="liq">$—</div>
    </div>

    <div class="card">
      <div class="label">24h Volume</div>
      <div class="value" id="vol">$—</div>
    </div>

    <div class="card">
      <div class="label">Market Cap</div>
      <div class="value" id="mc">$—</div>
    </div>

    <div class="card">
      <div class="label">Risk Score</div>
      <div class="risk" id="risk">—</div>
    </div>

  </div>

  <div class="main">

    <!-- CHART -->
    <div>
      <iframe
        src="https://www.geckoterminal.com/solana/pools/sPJ7Ae8Z77xNR281gdFjfCScAN6RWCb3GinsvZ2v39g?embed=1">
      </iframe>
    </div>

    <!-- ACTION PANEL -->
    <div>

      <a class="btn green" href="https://pump.fun/At4L287tND4vLSURFeVz2fqhbvNgnE76nfFg7gy9pump">BUY</a>

      <a class="btn" href="https://solscan.io/account/4YXiuFu5qWDeUqKAMGFbSAM1eimADvjsS3HW2k7EqYnh">
        Orca Liquidity Pool
      </a>

      <a class="btn" href="https://app.streamflow.finance/contract/solana/mainnet/5P7kHAQc8eUAMPnhmxrcekrJ6Mi9NUcTZsYVY3jugomk">
        LP Lock Proof
      </a>

      <a class="btn" href="https://verifyk2b.github.io/verifyk2b/verify/">
        Verification Hub
      </a>

      <div class="card">
        <div class="label">System Status</div>
        <div class="small" id="status">Loading chain data...</div>
      </div>

    </div>

  </div>

</div>

<script>
const POOL = "sPJ7Ae8Z77xNR281gdFjfCScAN6RWCb3GinsvZ2v39g";

// risk engine (simple deterministic scoring model)
function calcRisk(liq, vol){
  if(liq > 500000 && vol > 200000) return {t:"LOW", c:"low"};
  if(liq > 100000 && vol > 50000) return {t:"MED", c:"med"};
  return {t:"HIGH", c:"high"};
}

async function load(){
  try{
    const res = await fetch(`https://api.geckoterminal.com/api/v2/networks/solana/pools/${POOL}`);
    const data = await res.json();

    const attrs = data.data.attributes;

    const liq = Number(attrs.reserve_in_usd || 0);
    const vol = Number(attrs.volume_usd?.h24 || 0);
    const mc  = Number(attrs.fdv_usd || 0);

    document.getElementById("liq").innerText = "$" + liq.toLocaleString();
    document.getElementById("vol").innerText = "$" + vol.toLocaleString();
    document.getElementById("mc").innerText  = "$" + mc.toLocaleString();

    const risk = calcRisk(liq, vol);

    document.getElementById("risk").innerHTML =
      `<span class="${risk.c}">${risk.t}</span>`;

    document.getElementById("status").innerText =
      "On-chain sync active • Liquidity verified via DEX feed";

  }catch(e){
    document.getElementById("status").innerText =
      "Data sync failed — fallback mode active";
  }
}

load();
setInterval(load, 60000);
</script>

</body>
</html>
