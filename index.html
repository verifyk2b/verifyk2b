<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Token Action Panel</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b0f17;
      color: #ffffff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      width: 360px;
      background: #121a2a;
      border: 1px solid #1f2a44;
      border-radius: 14px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    .title {
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 12px;
      color: #9aa4b2;
      margin-bottom: 16px;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 12px;
      margin-bottom: 10px;
      border-radius: 10px;
      text-align: center;
      text-decoration: none;
      font-weight: 600;
      font-size: 14px;
      transition: 0.2s ease;
      border: 1px solid transparent;
    }

    .primary {
      background: #6c5ce7;
      color: #fff;
    }

    .primary:hover {
      background: #7d6df0;
    }

    .secondary {
      background: #1b2436;
      color: #ffffff;
      border: 1px solid #2a3754;
    }

    .secondary:hover {
      background: #222e45;
    }

    .tertiary {
      background: #111827;
      color: #cbd5e1;
      border: 1px solid #26324d;
    }

    .tertiary:hover {
      background: #162033;
    }

    .footer {
      margin-top: 12px;
      font-size: 11px;
      color: #6b7280;
      text-align: center;
    }
  </style>
</head>

<body>

  <div class="card">

    <div class="title">Krumbs 2 Bricks</div>
    <div class="subtitle">Token Action Gateway</div>

    <!-- Primary execution layer -->
    <a class="btn primary"
       href="https://jup.ag/tokens/At4L287tND4vLSURFeVz2fqhbvNgnE76nfFg7gy9pump"
       target="_blank" rel="noopener noreferrer">
      Trade on Jupiter
    </a>

    <!-- Wallet layer -->
    <a class="btn secondary"
       href="https://phantom.com/tokens/solana/At4L287tND4vLSURFeVz2fqhbvNgnE76nfFg7gy9pump?referralId=9shcoy36mjf"
       target="_blank" rel="noopener noreferrer">
      Open in Phantom
    </a>

    <!-- Analytics / tracking layer -->
    <a class="btn tertiary"
       href="https://www.solflare.com/prices/krumbs-2-bricks/At4L287tND4vLSURFeVz2fqhbvNgnE76nfFg7gy9pump/?utm_source=stp_share"
       target="_blank" rel="noopener noreferrer">
      View Price (Solflare)
    </a>

    <div class="footer">
      External links only • No custody • No guarantees
    </div>

  </div>

</body>
</html>
