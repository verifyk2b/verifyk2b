<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Krumbs 2 Bricks</title>

  <style>
    /* =========================
       RESET / BASE
       ========================= */
    *{ box-sizing:border-box; }
    html,body{ height:100%; }
    body{
      margin:0;
      background:#000;
      color:#fff;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }
    a{ color:inherit; text-decoration:none; -webkit-tap-highlight-color:transparent; }

    :root{
      --panel:#0f1115;
      --panel2:#0b0c10;
      --border:rgba(255,255,255,.10);
      --muted:rgba(255,255,255,.70);
      --muted2:rgba(255,255,255,.50);
      --shadow:0 18px 28px rgba(0,0,0,.55);
      --radius:14px;
      --max:1180px;
    }

    /* =========================
       WRAP
       ========================= */
    .wrap{
      width:100%;
      max-width:var(--max);
      margin:0 auto;
      padding:22px 18px 28px;
    }

    /* =========================
       HERO
       ========================= */
    .hero{
      display:flex;
      flex-direction:column;
      align-items:center;
      text-align:center;
      gap:10px;
      padding:10px 0 14px;
    }
    .logo{
      width:min(520px, 100%);
      height:auto;
      display:block;
      border-radius:12px;
    }
    .tagline{
      font-size:1rem;
      color:var(--muted);
      line-height:1.35;
      margin-top:6px;
    }

    /* =========================
       STATS
       ========================= */
    .stats{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:16px;
      margin-top:14px;
    }
    .stat{
      background:linear-gradient(180deg,var(--panel),var(--panel2));
      border:1px solid var(--border);
      border-radius:var(--radius);
      padding:16px 16px 14px;
      box-shadow: var(--shadow);
      min-height:86px;
      display:flex;
      flex-direction:column;
      justify-content:center;
      position:relative;
    }
    .label{
      font-size:.78rem;
      letter-spacing:.08em;
      text-transform:uppercase;
      color:var(--muted2);
      margin-bottom:8px;
    }
    .value{
      font-size:1.35rem;
      font-weight:900;
      letter-spacing:.01em;
    }

    /* Clickable stat wrapper */
    .statlink{ display:block; }
    .statlink:hover .stat{ filter:brightness(1.05); }
    .statlink:active .stat{ transform:translateY(1px); }

    /* =========================
       MAIN GRID (CHART + ACTIONS)
       ========================= */
    .main{
      display:grid;
      grid-template-columns: 1.65fr 1fr;
      gap:18px;
      margin-top:18px;
      align-items:stretch;           /* FIX #1: stretch columns to same height */
    }

    /* =========================
       CARD
       ========================= */
    .card{
      background:linear-gradient(180deg,var(--panel),var(--panel2));
      border:1px solid var(--border);
      border-radius:var(--radius);
      overflow:hidden;
      box-shadow: var(--shadow);
    }
    .card-head{
      padding:12px 14px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      border-bottom:1px solid var(--border);
      gap:10px;
    }
    .card-title{
      font-weight:900;
      font-size:1rem;
      letter-spacing:.01em;
    }
    .card-note{
      font-size:.82rem;
      color:var(--muted2);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    /* =========================
       CHART IFRAME
       ========================= */
    .iframe{
      width:100%;
      height:620px;
      border:0;
      display:block;
      background:#000;
    }

    /* =========================
       ACTIONS COLUMN (fills height)
       ========================= */
    .actions{
      display:flex;
      flex-direction:column;
      justify-content:space-between; /* FIX #1: push contract to bottom */
      gap:12px;
      min-height:100%;
    }

    .btn-grid{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:12px;
    }

    .btn{
      display:flex;
      align-items:center;
      justify-content:center;
      min-height:52px;
      padding:14px 12px;
      border-radius:16px;
      font-weight:900;
      font-size:.95rem;
      letter-spacing:.04em;
      text-transform:uppercase;
      border:1px solid rgba(255,255,255,.14);
      background:rgba(255,255,255,.06);
      color:#fff;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.14),
        0 18px 28px rgba(0,0,0,.55);
      transition: transform .15s ease, box-shadow .15s ease, filter .15s ease, background .15s ease;
      text-align:center;
      cursor:pointer;
      user-select:none;
    }
    .btn:hover{
      transform:translateY(-1px);
      filter:brightness(1.05);
      background:rgba(255,255,255,.08);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.18),
        0 24px 34px rgba(0,0,0,.60);
    }
    .btn:active{
      transform:translateY(1px);
      filter:brightness(.98);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.10),
        0 12px 18px rgba(0,0,0,.55);
    }

    .btn.buy{
      background:linear-gradient(165deg,#bef264,#4d7c0f);
      color:#111;
      border-color:rgba(255,255,255,.10);
    }
    .btn.copy{
      background:linear-gradient(165deg,#111827,#0b1220);
    }

    /* =========================
       CONTRACT BAR
       ========================= */
    .contract{
      padding:12px 12px;
      background:rgba(255,255,255,.04);
      border:1px solid var(--border);
      border-radius:var(--radius);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
    }
    .contract .left{ min-width:0; }
    .contract .k{
      font-size:.78rem;
      text-transform:uppercase;
      letter-spacing:.08em;
      color:var(--muted2);
      margin-bottom:6px;
    }
    .contract .addr{
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size:.92rem;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      max-width:320px;
      color:rgba(255,255,255,.88);
    }

    .pill{
      border:1px solid rgba(255,255,255,.14);
      background:rgba(255,255,255,.06);
      color:#fff;
      border-radius:999px;
      padding:10px 12px;
      font-weight:900;
      text-transform:uppercase;
      letter-spacing:.04em;
      font-size:.82rem;
      cursor:pointer;
      user-select:none;
      transition: filter .15s ease, transform .15s ease, background .15s ease;
      white-space:nowrap;
    }
    .pill:hover{ filter:brightness(1.06); background:rgba(255,255,255,.08); }
    .pill:active{ transform:translateY(1px); filter:brightness(.98); }

    .footer{
      margin-top:18px;
      text-align:center;
      color:var(--muted2);
      font-size:.86rem;
      line-height:1.35;
      padding:10px 0 0;
    }

    /* =========================
       RESPONSIVE
       ========================= */
    @media (max-width:1024px){
      .iframe{ height:560px; }
      .main{ grid-template-columns: 1.45fr 1fr; }
    }
    @media (max-width:860px){
      .main{ grid-template-columns:1fr; }
      .iframe{ height:520px; }
      .actions{ justify-content:flex-start; }
    }
    @media (max-width:768px){
      .stats{ grid-template-columns:1fr 1fr; }
      .iframe{ height:480px; }
      .contract .addr{ max-width:240px; }
    }
    @media (max-width:420px){
      .wrap{ padding:18px 14px 24px; }
      .value{ font-size:1.22rem; }
      .btn-grid{ grid-template-columns:1fr; }
      .iframe{ height:440px; }
      .contract .addr{ max-width:200px; }
      .btn{ min-height:50px; font-size:.92rem; }
    }
  </style>
</head>

<body>
  <div class="wrap">

    <!-- HERO -->
    <div class="hero">
      <img class="logo" src="hero.png" alt="Krumbs 2 Bricks" />
      <div class="tagline">Fixed Supply. Locked Liquidity. Verifiable Structure.</div>
    </div>

    <!-- STATS (Days Live is clickable) -->
    <div class="stats">
      <div class="stat">
        <div class="label">Total Supply</div>
        <div class="value" id="totalSupply">—</div>
      </div>

      <div class="stat">
        <div class="label">Burned</div>
        <div class="value" id="burned">—</div>
      </div>

      <div class="stat">
        <div class="label">Locked</div>
        <div class="value" id="locked">—</div>
      </div>

      <a class="statlink" id="daysLink" href="#" target="_blank" rel="noopener noreferrer">
        <div class="stat">
          <div class="label">Days Live</div>
          <div class="value" id="daysLive">—</div>
        </div>
      </a>
    </div>

    <!-- MAIN -->
    <div class="main">

      <!-- CHART -->
      <div class="card">
        <div class="card-head">
          <div class="card-title">Real-Time Chart</div>
          <div class="card-note">GeckoTerminal</div>
        </div>

        <iframe
          class="iframe"
          src="https://www.geckoterminal.com/solana/pools/sPJ7Ae8Z77xNR281gdFjfCScAN6RWCb3GinsvZ2v39g?embed=1&info=0&swaps=0&light_chart=0&chart_type=market_cap&resolution=1d&bg_color=111827"
          title="K2B Real-Time Chart"
          loading="lazy"
          allow="clipboard-write; fullscreen"
          allowfullscreen
          referrerpolicy="no-referrer-when-downgrade"
          sandbox="allow-scripts allow-same-origin allow-popups allow-forms">
        </iframe>
      </div>

      <!-- ACTIONS -->
      <div class="actions">

        <!-- top block -->
        <div class="btn-grid">
          <!-- VERIFY removed (redundant). Keep one hub button only -->
          <a class="btn buy"
             href="https://pump.fun/At4L287tND4vLSURFeVz2fqhbvNgnE76nfFg7gy9pump"
             target="_blank" rel="noopener noreferrer">
            Buy
          </a>

          <a class="btn"
             href="https://verifyk2b.github.io/verifyk2b/verify/"
             target="_blank" rel="noopener noreferrer">
            Verification Hub
          </a>

          <a class="btn"
             href="https://solscan.io/token/At4L287tND4vLSURFeVz2fqhbvNgnE76nfFg7gy9pump"
             target="_blank" rel="noopener noreferrer">
            View Token
          </a>

          <!-- FIX: Burn Wallet link is a direct URL + uses rel noopener noreferrer -->
          <a class="btn"
             href="https://solscan.io/account/C9TePxZ41j2yDkDGgLxLT1ztLdvMpgpVNDSRv9cmq1K3"
             target="_blank" rel="noopener noreferrer">
            Burn Wallet
          </a>

          <!-- TOKEN LOCKS (EQUAL STRUCTURE) -->

<a class="btn"
   href="https://app.streamflow.finance/contract/solana/mainnet/DhPS19jFRTSecSUvjyU3Z8vVSnxdLdf1n5spzit7YPfC"
   target="_blank" rel="noopener noreferrer">
  100M Locked (10 Years)
</a>

<a class="btn"
   href="https://app.streamflow.finance/contract/solana/mainnet/6tLvzGQL7em8wKnvwG3Gy6iqrcQJjoAwEvZtYFA759qf"
   target="_blank" rel="noopener noreferrer">
  100M Locked (5 Years)
</a>

<a class="btn"
   href="https://app.streamflow.finance/contract/solana/mainnet/5P7kHAQc8eUAMPnhmxrcekrJ6Mi9NUcTZsYVY3jugomk"
   target="_blank" rel="noopener noreferrer">
  LP Lock Proof
</a>

          <button class="btn copy" id="copyBtn" type="button">
            Copy Contract
          </button>
        </div>

        <!-- bottom block -->
        <div class="contract">
          <div class="left">
            <div class="k">Contract</div>
            <div class="addr" id="contractAddr">—</div>
          </div>
          <div class="pill" id="copyPill" role="button" tabindex="0">Copy</div>
        </div>

      </div>
    </div>

    <div class="footer">
      © <span id="year"></span> Krumbs 2 Bricks · No Financial Advice
    </div>

  </div>

  <script>
    /* =========================
       CONFIG (edit once)
       ========================= */
    const CONFIG = {
      launchDate: '2026-01-04', // YYYY-MM-DD
      daysLiveLink: 'https://verifyk2b.github.io/verifyk2b/verify/',

      totalSupply: '1,000,000,000',
      burnedExact: '154,804,133.59',  // <- your burn amount
      locked: '260,000,000+',

      contract: 'At4L287tND4vLSURFeVz2fqhbvNgnE76nfFg7gy9pump'
    };

    // Helpers
    function calcDaysLive(isoDate){
      if(!isoDate) return '—';
      const start = new Date(isoDate + 'T00:00:00');
      const now = new Date();
      const ms = now - start;
      const days = Math.floor(ms / (1000 * 60 * 60 * 24));
      return (days >= 0) ? String(days) : '—';
    }

    function formatBurnedTo2Decimals(valueWithCommas){
      const n = Number(String(valueWithCommas).replace(/,/g,''));
      if(!Number.isFinite(n)) return String(valueWithCommas);
      return n.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    // Bind stats
    document.getElementById('totalSupply').textContent = CONFIG.totalSupply;
    document.getElementById('burned').textContent = formatBurnedTo2Decimals(CONFIG.burnedExact);
    document.getElementById('locked').textContent = CONFIG.locked;

    // Days live + link
    document.getElementById('daysLive').textContent = calcDaysLive(CONFIG.launchDate);
    const daysLink = document.getElementById('daysLink');
    daysLink.href = CONFIG.daysLiveLink;

    // Contract
    const addrEl = document.getElementById('contractAddr');
    addrEl.textContent = CONFIG.contract;

    // Footer year
    document.getElementById('year').textContent = new Date().getFullYear();

    // Copy contract (button + pill + keyboard)
    const copyBtn = document.getElementById('copyBtn');
    const copyPill = document.getElementById('copyPill');

    async function copyAddress(){
      const text = addrEl.textContent.trim();
      try{
        await navigator.clipboard.writeText(text);
        toast('Copied');
      }catch(e){
        const ta = document.createElement('textarea');
        ta.value = text;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        toast('Copied');
      }
    }

    function toast(msg){
      const t = document.createElement('div');
      t.textContent = msg;
      t.style.position = 'fixed';
      t.style.left = '50%';
      t.style.bottom = '22px';
      t.style.transform = 'translateX(-50%)';
      t.style.padding = '10px 14px';
      t.style.background = 'rgba(0,0,0,.78)';
      t.style.border = '1px solid rgba(255,255,255,.14)';
      t.style.borderRadius = '999px';
      t.style.color = '#fff';
      t.style.fontWeight = '900';
      t.style.letterSpacing = '.04em';
      t.style.textTransform = 'uppercase';
      t.style.fontSize = '.78rem';
      t.style.zIndex = '9999';
      t.style.backdropFilter = 'blur(6px)';
      document.body.appendChild(t);
      setTimeout(()=> t.remove(), 900);
    }

    copyBtn.addEventListener('click', copyAddress);
    copyPill.addEventListener('click', copyAddress);
    copyPill.addEventListener('keydown', (e) => {
      if(e.key === 'Enter' || e.key === ' ') copyAddress();
    });
  </script>
</body>
</html>
