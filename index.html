<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Web3 Token Dashboard</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #070a12;
      color: white;
      display: flex;
      justify-content: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .card {
      background: #111827;
      border: 1px solid #1f2937;
      border-radius: 12px;
      padding: 14px;
    }

    .title {
      font-size: 18px;
      font-weight: 700;
    }

    .subtitle {
      font-size: 12px;
      color: #9ca3af;
      margin-top: 4px;
    }

    .label {
      font-size: 11px;
      color: #9ca3af;
    }

    .mono {
      font-size: 12px;
      word-break: break-all;
      margin-top: 4px;
    }

    a.button {
      display: block;
      text-align: center;
      padding: 14px;
      border-radius: 10px;
      font-weight: 700;
      text-decoration: none;
      color: white;
    }

    .jupiter { background: #7c3aed; }
    .phantom { background: #1f2937; }
    .solflare { background: #111827; border: 1px solid #2a2f3a; }

    .footer {
      font-size: 10px;
      color: #6b7280;
      text-align: center;
      margin-top: 6px;
    }
  </style>
</head>

<body>

  <div class="container">

    <div class="card">
      <div class="title">Web3 Token Dashboard</div>
      <div class="subtitle">Mobile execution layer</div>
    </div>

    <div class="card">
      <div class="label">Token Mint</div>
      <div class="mono" id="token"></div>
    </div>

    <a class="button jupiter" id="jup" target="_blank">
      Trade on Jupiter
    </a>

    <a class="button phantom" id="phantom" target="_blank">
      Open in Phantom
    </a>

    <a class="button solflare" id="solflare" target="_blank">
      View Price (Solflare)
    </a>

    <div class="footer">
      External links only • Mobile optimized execution layer
    </div>

  </div>

  <script>
    const token =
      "At4L287tND4vLSURFeVz2fqhbvNgnE76nfFg7gy9pump";

    document.getElementById("token").innerText = token;

    document.getElementById("jup").href =
      "https://jup.ag/tokens/" + token;

    document.getElementById("phantom").href =
      "https://phantom.com/tokens/solana/" +
      token +
      "?referralId=9shcoy36mjf";

    document.getElementById("solflare").href =
      "https://www.solflare.com/prices/krumbs-2-bricks/" +
      token +
      "/";
  </script>

</body>
</html>
